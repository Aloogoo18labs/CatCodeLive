<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CatCodeLive – JupiterScan Trend Pulse Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --bg-primary: #0b0d12;
      --bg-secondary: #13171f;
      --bg-card: #1a1f2e;
      --accent: #00d4aa;
      --accent-dim: #00a884;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --border: #30363d;
      --danger: #f85149;
      --success: #3fb950;
      --radius: 12px;
      --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      --font-sans: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .app-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .app-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .app-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 0.25rem;
    }
    .connector {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .connector input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      width: 320px;
      max-width: 100%;
    }
    .connector input::placeholder { color: var(--text-muted); }
    .btn {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn:hover { background: var(--accent-dim); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
